source = ~/.cache/hellwal/hyprland.conf

# monitors
monitor = eDP-1,1920x1080@60,0x0,0.83
monitor = , preferred, auto, 1, mirror, eDP-1
# monitor = HDMI-A-1,3840x2160@60,3840x0,1.5

# autostart
exec-once = hyprlock --immediate
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = ~/.config/hypr/scripts/startup_script.sh
exec-once = avizo-service
exec-once = wl-paste --watch cliphist store
exec-once = quickshell -p ~/.config/hypr/qs-hyprview/shell.qml

# yt music on scratchpad on startup
exec-once = sh -c 'for i in {1..120}; do \
    ADDRESS=$(hyprctl clients -j | jq -r ".[] | select(.title | contains(\"YouTube Music\")) | .address"); \
    if [ -n "$ADDRESS" ]; then \
        hyprctl dispatch movetoworkspacesilent special:magic,address:$ADDRESS; \
        hyprctl dispatch togglefloating address:$ADDRESS; \
        hyprctl dispatch resizewindowpixel exact 700 1000,address:$ADDRESS; \
        break; \
    fi; \
    sleep 1; \
  done'


# environment variables
env = XCURSOR_SIZE,40
env = HYPRCURSOR_SIZE,40
env = HYPRCURSOR_THEME, ComixCursors-Opaque-Black

# eye candy
general {
    gaps_in = 8
    gaps_out = 11, 16, 16, 16
    border_size = 4

    col.active_border = $color7
    col.inactive_border = $color1

    resize_on_border = false
    allow_tearing = false

    layout = scrolling
}
decoration {
    rounding = 5
    rounding_power = 13
    active_opacity = 0.925
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0
    dim_modal = true
    dim_special = 0.3
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        xray = true
        size = 2
        passes = 3
        ignore_opacity = true
        vibrancy = 0.1696
        popups = true
    }
}
animations {
    enabled = yes, please :)

    # animation curves
    bezier = wind, 0.2, 0.6, 0.1, 1.05
    bezier = wind2, 0.05, 1.1, 0.1, 1.5
    bezier = winIn, 0.1, 1.1, 0.1, 1.0175
    bezier = liner, 1, 1, 1, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = workspace, 0.22, 1, 0.36, 1.0175
    bezier = winClose, 0.8, 1, 0.9, 1.05
    bezier = spring, 0.45, 1.25, 0.45, 1.15

    # animation configs
    animation = border, 1, 4, liner
    animation = borderangle, 1, 30, liner, loop
    animation = windows, 1, 2, wind, slide
    animation = windowsIn, 1, 10, winIn, slide
    animation = windowsOut, 1, 35, winClose, slide
    animation = windowsMove, 1, 20, wind, popins
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 9, menu_decel, slide
    animation = layersOut, 1, 9, menu_decel, slide
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 10, workspace, slidevert

}

# layout settings
scrolling {
    column_width = 0.3333
    explicit_column_widths = 0.3333,0.5,0.667
    follow_min_visible = 0.15
    direction = right
    fullscreen_on_one_column = false
}

# input (duh)
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    sensitivity = -0.275 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat
    touchpad {
        natural_scroll = true
        scroll_factor = 0.65
    }
}
device {
    name = syna30b0:00-06cb:ce08-2
    sensitivity = 0.7
}

# ---- keybindings end ---- #

# rofi stuff
bind = SUPER, V, exec, ~/.config/rofi/scripts/clipboard.sh
bind = SUPER SHIFT, V, exec, rofi -modi emoji -show emoji -theme-str 'listview {lines: 10;}' -theme-str 'window {width: 30%;}'
bind = SUPER, ESCAPE, exec, rofi-power
bind = SUPER SHIFT, C, exec, rofi -show calc -theme-str 'window { width: 15%; }' -theme-str 'listview {lines: 0;}'
bind = SUPER SHIFT, B, exec, ~/.config/rofi/scripts/rofi-bluetooth-claude.sh
bind = ALT CTRL, S, exec, ~/.config/rofi/scripts/select-audio.sh
bind = SUPER, SPACE, exec, rofi -show drun -theme-str 'listview {lines: 10;}' -theme-str 'window {width: 17%;}'
bind = SUPER, GRAVE, exec, ~/.config/rofi/scripts/wallpaper-rofi-2.sh
bind = SUPER ALT, E, exec, ~/.config/rofi/scripts/file-selector/rofi-file-selector.sh

# other stuff to escape quickshell
bind = SUPER, L, exec, hyprlock
bind = SUPER, N, exec, makoctl dismiss -a
bind = SUPER, F5, exec, gpu-screen-recorder -w screen -f 60 -fm cfr -k h264 -c mp4 -a $(pactl get-default-sink).monitor -o ~/Videos/recordings/$(date +%d.%m.%Y_%I:%M%p).mp4 & notify-send 'recording started'
bind = SUPER, F4, exec, pkill -INT -f gpu-screen-recorder && notify-send 'recording stopped'

# applications
bind = SUPER, RETURN, exec, foot
bind = SUPER, B, exec, zen-beta
bind = SUPER, E, exec, nautilus --new-window
bind = ALT SHIFT, W, exec, ~/nixos-config/home-manager/hypr/scripts/toggle_waybar.sh

# focus window
bind = ALT, A, exec, hyprctl dispatch focuswindow address:$(hyprctl -j clients | jq -r '[.[] | select(.workspace.id == '$(hyprctl -j activeworkspace | jq .id)') ] | sort_by(.at[0] + (.size[0]/2), .address) | (map(.address) | index("'"$(hyprctl -j activewindow | jq -r .address)"'")) as $idx | .[([$idx - 1, 0] | max)].address')
bind = ALT, D, exec, hyprctl dispatch focuswindow address:$(hyprctl -j clients | jq -r '[.[] | select(.workspace.id == '$(hyprctl -j activeworkspace | jq .id)') ] | sort_by(.at[0] + (.size[0]/2), .address) | (map(.address) | index("'"$(hyprctl -j activewindow | jq -r .address)"'")) as $idx | .[([$idx + 1, length - 1] | min)].address')
bind = ALT, W, movefocus, u
bind = ALT, S, movefocus, d
bind = ALT, Tab, focuscurrentorlast

# focus first and last window in workspace
bind = SUPER, A, exec, hyprctl dispatch focuswindow address:$(hyprctl clients -j | jq -r '[.[] | select(.workspace.id == '$(hyprctl activeworkspace -j | jq .id)') ] | sort_by(.at[0]) | first | .address')
bind = SUPER, D, exec, hyprctl dispatch focuswindow address:$(hyprctl clients -j | jq -r '[.[] | select(.workspace.id == '$(hyprctl activeworkspace -j | jq .id)') ] | sort_by(.at[0]) | last | .address')

# switch workspace by number
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# switch workspaces relatively
binde = SUPER, W, workspace, r-1
binde = SUPER, S, workspace, r+1
bind = SUPER, Tab, workspace, previous
bind = SUPER, Z, workspace, empty

# scroll through workspaces with super mousescroll
bind = SUPER, mouse_up, workspace, r+1
bind = SUPER, mouse_down, workspace, r-1

# move window to workspace
bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 6, movetoworkspace, 6
bind = CTRL SHIFT, 7, movetoworkspace, 7
bind = CTRL SHIFT, 8, movetoworkspace, 8
bind = CTRL SHIFT, 9, movetoworkspace, 9
bind = CTRL SHIFT, 0, movetoworkspace, 10
bind = SUPER SHIFT, W, movetoworkspace, -1
bind = SUPER SHIFT, S, movetoworkspace, +1
bind = SUPER SHIFT, Z, movetoworkspace, empty

# move all windows to workspace
bind = SUPER CTRL SHIFT, 1, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 1
bind = SUPER CTRL SHIFT, 2, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 2
bind = SUPER CTRL SHIFT, 3, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 3
bind = SUPER CTRL SHIFT, 4, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 4
bind = SUPER CTRL SHIFT, 5, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 5
bind = SUPER CTRL SHIFT, 6, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 6
bind = SUPER CTRL SHIFT, 7, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 7
bind = SUPER CTRL SHIFT, 8, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 8
bind = SUPER CTRL SHIFT, 9, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 9
bind = SUPER CTRL SHIFT, 0, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh 10
bind = SUPER ALT, W, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh -1
bind = SUPER ALT, S, exec, .config/hypr/scripts/move_all_windows_in_workspace.sh +1

# move window
bind = CTRL SHIFT, A, layoutmsg, swapcol l
bind = CTRL SHIFT, D, layoutmsg, swapcol r
bind = CTRL SHIFT, W, movewindow, u
bind = CTRL SHIFT, S, movewindow, d
bind = SUPER CTRL SHIFT, Q, movewindow, l
bind = SUPER CTRL SHIFT, W, movewindow, r

# some layout thingies
bind = SUPER CTRL, X, layoutmsg, fit visible
bind = SUPER CTRL, Z, layoutmsg, fit all
bind = SUPER CTRL, Q, layoutmsg, fit tobeg
bind = SUPER CTRL, W, layoutmsg, fit toend
bind = SUPER, T, togglefloating
bind = SUPER SHIFT, T, cyclenext, tiled
bind = SUPER, F, fullscreen, 0
bind = SUPER, Q, exec, .config/hypr/scripts/toggle_layout.sh
bind = ALT, GRAVE, exec, quickshell ipc -p ~/.config/hypr/qs-hyprview/shell.qml call expose toggle justified # by dom0/qs-hyprview
bind = CTRL SHIFT, Z, killactive

# resize window
bind = SUPER CTRL SHIFT, Z, layoutmsg, colresize +conf
bind = SUPER CTRL, D, layoutmsg, colresize +0.03
bind = SUPER CTRL, A, layoutmsg, colresize -0.03
bind = SUPER CTRL SHIFT, X, layoutmsg, fit active

# move/resize window with mouse buttons
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# scratchpad
bind = ALT SHIFT, S, togglespecialworkspace, magic
bind = ALT CTRL SHIFT, S, movetoworkspace, special:magic

# audio and brightness controls
bindle = ALT, F2, exec, volumectl -u up
bindle = ALT, F1, exec, volumectl -u down
bindl = ALT, F3, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , F2, exec, playerctl play-pause
bindl = , F1, exec, playerctl previous
bindl = , F3, exec, playerctl next
bindle = SHIFT, F2, exec, lightctl up
bindle = SHIFT, F1, exec, lightctl down

# laptop keys for audio/brightness
bindel = ,XF86AudioRaiseVolume, exec, volumectl -u up
bindel = ,XF86AudioLowerVolume, exec, volumectl -u down
bindel = ,XF86MonBrightnessUp, exec, lightctl up
bindel = ,XF86MonBrightnessDown, exec, lightctl down

# zoom mouse version
bind = SUPER SHIFT, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {v = $2 * 1.1; print (v > 3 ? 3 : v)}')
bind = SUPER SHIFT, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {v = $2 * 0.9; print (v < 1 ? 1 : v)}')

# zoom kb version
bind = SUPER, F1, exec, hyprctl -q keyword cursor:zoom_factor 1
binde = SUPER, F2, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {v = $2 * 1.1; print (v > 3 ? 3 : v)}')
bind = SUPER, F3, exec, hyprctl -q keyword cursor:zoom_factor 1.75
# binde = SUPER, F1, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {v = $2 * 0.9; print (v < 1 ? 1 : v)}')

# screenshot
bind = SUPER, F8, exec, hypr-screenshot output
bind = SUPER, F7, exec, hypr-screenshot region
bind = SUPER, F6, exec, hypr-screenshot window

# ---- keybindings end ---- #

# window rules
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}
windowrule {
    name = foot blur and opacity
    match:class = foot
    opacity = 0.6 override 0.6 override
}
windowrule {
    name = zen blur
    match:class = zen-beta
    opacity = 0.83 override 0.83 override
}
windowrule {
    name = nautilus blur
    match:class = org.gnome.Nautilus
    opacity = 0.75 override 0.75 override
}
windowrule {
    name = zed blur
    match:class = dev.zed.Zed
    opacity = 0.75 override 0.75 override
}

# layer rules
layerrule = dim_around on, match:namespace rofi
layerrule = dim_around on, match:namespace ^(quickshell:expose)$
layerrule = no_anim on, match:namespace wayfreeze
# layerrule = no_anim on, match:namespace selection # for slurp

# some things
misc {
    focus_on_activate = true
    animate_manual_resizes = true
    force_default_wallpaper = 0
    disable_hyprland_logo = false
    disable_splash_rendering = true
}
xwayland {
  force_zero_scaling = true
}
binds {
    scroll_event_delay = 0
}
cursor {
    zoom_rigid = true
    zoom_detached_camera = false
    persistent_warps = true
    warp_on_change_workspace = true
}
